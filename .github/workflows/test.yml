name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test
      # Dogfood : le CLI se valide lui-meme (compteur "7 commandes" du README).
      - run: node cli.mjs validate
